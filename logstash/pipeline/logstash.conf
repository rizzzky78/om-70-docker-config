input {
  beats {
    port => 5044
  }

  tcp {
    port  => 50000
    codec => json
  }
}

filter {
  if [message] =~ /^\s*$/ {
    drop { }
  }
}

output {
  elasticsearch {
    hosts    => ["https://es01:9200"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl_enabled => true
    ssl_certificate_authorities => "/usr/share/logstash/config/certs/ca/ca.crt"
  }
}
