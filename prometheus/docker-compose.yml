# =============================================================================
# Prometheus & Grafana — Production Docker Compose Stack
# =============================================================================
# Compatible with:
#   - Docker Desktop (Windows + WSL2)
#   - Linux (Ubuntu Server) with Docker Engine
#
# Usage:
#   cp .env.example .env   # configure your settings
#   docker compose up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Prometheus — Metrics collection & storage
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: prometheus
    restart: unless-stopped
    user: "65534:65534" # nobody:nobody — Prometheus official recommendation
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      # Mount config as read-only
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      # Named volume for persistent TSDB data
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-30d}"
      - "--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-0}"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle" # allows POST /-/reload to reload config
      - "--web.enable-admin-api" # enables admin API endpoints
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${PROMETHEUS_MEM_LIMIT:-2g}
          cpus: "${PROMETHEUS_CPUS:-1.0}"
        reservations:
          memory: ${PROMETHEUS_MEM_RESERVATION:-512m}
    networks:
      - monitoring
    labels:
      monitoring.stack: "prometheus-grafana"
      monitoring.role: "metrics-collector"

  # ---------------------------------------------------------------------------
  # Grafana — Metrics visualization & dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:12.4.2
    container_name: grafana
    restart: unless-stopped
    # Grafana official image runs as UID 472
    user: "472:472"
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      # Named volume for persistent Grafana database (users, alerts, etc.)
      - grafana_data:/var/lib/grafana
      # Provisioning — datasources and dashboards auto-configured at startup
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      # Admin credentials — override in .env
      GF_SECURITY_ADMIN_USER: "${GF_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_ADMIN_PASSWORD:-change_me_in_production}"
      # Anonymous access — disabled by default for production
      GF_AUTH_ANONYMOUS_ENABLED: "${GF_AUTH_ANONYMOUS_ENABLED:-false}"
      # Server settings
      GF_SERVER_HTTP_PORT: "3000"
      # Logging
      GF_LOG_MODE: "console"
      GF_LOG_LEVEL: "warn"
      # Disable Grafana analytics/telemetry
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      # Dashboard settings
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/etc/grafana/provisioning/dashboards/nodejs-overview.json"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${GRAFANA_MEM_LIMIT:-512m}
          cpus: "${GRAFANA_CPUS:-0.5}"
        reservations:
          memory: ${GRAFANA_MEM_RESERVATION:-128m}
    networks:
      - monitoring
    labels:
      monitoring.stack: "prometheus-grafana"
      monitoring.role: "visualization"

# =============================================================================
# Networks
# =============================================================================
networks:
  monitoring:
    name: monitoring_network
    driver: bridge
  # To connect your application containers to this stack, either:
  # 1. Add your app to the 'monitoring' network above, OR
  # 2. Use an external network (recommended for existing stacks):
  #
  # external_app_network:
  #   external: true
  #   name: your_app_network_name

# =============================================================================
# Volumes
# =============================================================================
volumes:
  prometheus_data:
    name: prometheus_data
    driver: local
  grafana_data:
    name: grafana_data
    driver: local
